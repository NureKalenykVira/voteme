<div class="not-found">
  <div class="not-found__top">
    <h1 class="not-found__title">{{ 'notFound.title' | translate }}</h1>
    <p class="not-found__subtitle">{{ 'notFound.subtitle' | translate }}</p>
    <button type="button" class="not-found__btn" (click)="location.back()">{{ 'notFound.goBack' | translate }}</button>
  </div>
  <div class="not-found__bottom">
    <img
      class="not-found__vector not-found__vector--left"
      src="/assets/vectors/vector_4.svg"
      alt=""
      aria-hidden="true"
    />
    <img
      class="not-found__vector not-found__vector--right"
      src="/assets/vectors/vector_4.svg"
      alt=""
      aria-hidden="true"
    />
    <img class="not-found__logo" src="/assets/main/logo.svg" alt="VoteMe" />
  </div>
</div>
