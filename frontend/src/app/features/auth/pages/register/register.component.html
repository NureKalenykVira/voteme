<ui-auth-layout>
  <div class="card">

    <ng-container *ngIf="formState() === 'form'">
      <h1 class="title">Nice to meet you!</h1>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

        <ui-text-input
          label="Full Name"
          id="fullName"
          type="text"
          autocomplete="name"
          formControlName="fullName"
        />

        <ui-text-input
          label="Email"
          id="email"
          type="email"
          autocomplete="email"
          formControlName="email"
        />

        <ui-password-input
          label="Password"
          id="password"
          autocomplete="new-password"
          formControlName="password"
        />

        <ui-password-input
          label="Confirm password"
          id="confirmPassword"
          autocomplete="new-password"
          formControlName="confirmPassword"
          crossFieldErrorKey="passwordMismatch"
        />

        <ui-checkbox
          id="terms"
          label="I agree to Terms of Use and Privacy Policy"
          formControlName="terms"
        />

        <p *ngIf="serverError()" class="server-error">{{ serverError() }}</p>

        <ui-primary-button type="submit" [disabled]="loading()">Create account</ui-primary-button>

        <div class="separator"></div>

        <ui-secondary-button type="button" (click)="goToLogin()">
          Already have an account? Log in
        </ui-secondary-button>

      </form>
    </ng-container>

    <ng-container *ngIf="formState() === 'success'">
      <h1 class="title">Check your inbox!</h1>
      <p class="success-msg">We sent a confirmation link to your email. Click it to activate your account.</p>
      <div class="separator"></div>
      <ui-secondary-button type="button" (click)="goToLogin()">Go to Log in</ui-secondary-button>
    </ng-container>

  </div>
</ui-auth-layout>
