<div class="reset-page">
  <img class="bg-vector" src="/assets/auth/reset_vector.svg" alt="" />
  <div class="voteme-bg-text" aria-hidden="true">VoteMe</div>

  <div class="reset-card">
    <h1 class="card-title">{{ 'auth.resetPassword.title' | translate }}</h1>

    <form [formGroup]="form" (ngSubmit)="onSave()">
      <div class="field-group">
        <label class="field-label">{{ 'auth.resetPassword.newPassword' | translate }}</label>
        <div class="input-wrap">
          <input
            [type]="showNew() ? 'text' : 'password'"
            class="card-input"
            formControlName="newPassword"
            placeholder=""
          />
          <button type="button" class="eye-btn" (click)="showNew.set(!showNew())">
            <img
              [src]="showNew() ? '/assets/auth/closed_eye.svg' : '/assets/auth/open_eye.svg'"
              alt="toggle visibility"
              class="eye-icon"
            />
          </button>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">{{ 'auth.resetPassword.confirmPassword' | translate }}</label>
        <div class="input-wrap">
          <input
            [type]="showConfirm() ? 'text' : 'password'"
            class="card-input"
            formControlName="confirmPassword"
            placeholder=""
          />
          <button type="button" class="eye-btn" (click)="showConfirm.set(!showConfirm())">
            <img
              [src]="showConfirm() ? '/assets/auth/closed_eye.svg' : '/assets/auth/open_eye.svg'"
              alt="toggle visibility"
              class="eye-icon"
            />
          </button>
        </div>
      </div>

      <button type="submit" class="action-btn action-btn--filled" [disabled]="saving()">
        {{ (saving() ? 'auth.resetPassword.saving' : 'auth.resetPassword.save') | translate }}
      </button>
    </form>

    <button class="action-btn action-btn--outline" type="button" (click)="onCancel()">{{ 'auth.resetPassword.cancel' | translate }}</button>
  </div>
</div>
