<ui-auth-layout [vector]="vector" [vectorLogin]="true" [decoWords]="decoWords">
  <div class="card">

    <ng-container *ngIf="state() === 'loading'">
      <p class="message loading-text">Confirming your email…</p>
    </ng-container>

    <ng-container *ngIf="state() === 'success'">
      <h1 class="title">Email confirmed!</h1>
      <p class="message">Your account is ready. You can now log in.</p>
      <ui-primary-button type="button" (click)="goToLogin()">Log in</ui-primary-button>
    </ng-container>

    <ng-container *ngIf="state() === 'error'">
      <h1 class="title">Link expired</h1>
      <p class="message">This confirmation link is invalid or has already been used.</p>
      <div class="separator"></div>
      <ui-secondary-button type="button" (click)="goToRegister()">Back to sign up</ui-secondary-button>
    </ng-container>

  </div>
</ui-auth-layout>
