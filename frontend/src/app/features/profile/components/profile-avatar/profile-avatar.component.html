<div class="avatar-wrapper">
  <div class="avatar-circle" (click)="triggerFileInput()">
    <img
      *ngIf="displaySrc"
      [src]="displaySrc"
      class="avatar-img"
      alt="Profile picture"
    />
    <div *ngIf="!displaySrc" class="avatar-placeholder">
      <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </div>
  </div>
  <span class="reset-text" (click)="onReset()">Click to reset</span>
  <input
    #fileInput
    type="file"
    accept="image/*"
    class="file-input-hidden"
    (change)="onFileChange($event)"
  />
</div>
