<div class="profile-page">
  <img class="bg-vector" src="/assets/auth/profile_vector.svg" alt="" />

  <div class="profile-card">
    <!-- Header -->
    <div class="card-header">
      <app-profile-header-badge label="My profile" variant="purple" />
      <button class="pill-btn purple pill-btn--with-icon" (click)="onGoHome()">
        Go home <img src="/assets/auth/arrow_right.svg" class="btn-icon" alt="" />
      </button>
    </div>

    <!-- Loading state -->
    <div *ngIf="state() === 'loading'" class="loading">Loading...</div>

    <!-- Error state -->
    <div *ngIf="state() === 'error'" class="error-msg">Could not load profile.</div>

    <!-- Ready state -->
    <ng-container *ngIf="state() === 'ready'">
      <div class="profile-section">
        <!-- Avatar col -->
        <div class="avatar-col">
          <span class="field-label">Profile picture</span>
          <app-profile-avatar
            [previewUrl]="avatarPreview()"
            [persistedUrl]="resolvedAvatarUrl()"
            (fileSelected)="onFileSelected($event)"
            (reset)="onAvatarReset()"
          />
        </div>

        <!-- Form grid: 2 cols -->
        <div class="form-grid">
          <!-- Full name -->
          <div class="field-group">
            <label class="field-label">Full Name</label>
            <input
              class="profile-input"
              type="text"
              [formControl]="fullNameControl"
              placeholder="Your name"
            />
          </div>

          <!-- Email -->
          <div class="field-group">
            <label class="field-label">Email</label>
            <input
              class="profile-input"
              type="email"
              [value]="user()?.email ?? ''"
              readonly
            />
          </div>

          <!-- Password -->
          <div class="field-group">
            <label class="field-label">Password</label>
            <input
              class="profile-input"
              type="password"
              value="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
              readonly
            />
            <span class="forgot-hint">
              Don't remember your password?
              <a class="forgot-link" (click)="onForgotPassword()">Click here to reset</a>
            </span>
          </div>

          <!-- Role -->
          <div class="field-group">
            <label class="field-label">Role</label>
            <app-role-badge [role]="user()?.role ?? ''" />
          </div>
        </div>
      </div>

      <!-- Save row -->
      <div class="save-row">
        <button class="pill-btn purple save-btn pill-btn--with-icon" (click)="onSaveChanges()">
          Save changes <img src="/assets/auth/save.svg" class="btn-icon" alt="" />
        </button>
      </div>

      <!-- Activity section -->
      <div class="activity-section">
        <app-profile-header-badge label="My activity" variant="lime" />
        <div class="activity-rows">
          <app-activity-stat-row label="Votings participated" [value]="0" />
          <div class="activity-links">
            <app-activity-link-button label="View my votings" routerLink="/my-votings" />
            <app-activity-link-button
              *ngIf="user()?.role === 'organizer' || user()?.role === 'auditor'"
              label="View event log"
              routerLink="/home"
            />
          </div>
        </div>
        <div class="action-row">
          <!-- Default: show Delete account button -->
          <ng-container *ngIf="!confirmDelete()">
            <button class="pill-btn red" (click)="onDeleteAccount()">Delete account</button>
          </ng-container>

          <!-- Confirmation state -->
          <ng-container *ngIf="confirmDelete()">
            <div class="confirm-inline">
              <span class="delete-confirm-text">Are you sure? This cannot be undone.</span>
              <button class="pill-btn red" (click)="onConfirmDelete()" [disabled]="deleting()">
                {{ deleting() ? 'Deleting...' : 'Yes, delete' }}
              </button>
              <button class="pill-btn purple" (click)="onCancelDelete()" [disabled]="deleting()">Cancel</button>
            </div>
          </ng-container>

          <button class="pill-btn purple pill-btn--with-icon" (click)="onLogout()">
            Log out <img src="/assets/auth/arrow_right.svg" class="btn-icon" alt="" />
          </button>
        </div>
      </div>
    </ng-container>
  </div>

  <!-- Reset password modal -->
  <div class="reset-modal-overlay" *ngIf="showResetModal()" (click)="onCancelReset()">
    <div class="reset-modal-card" (click)="$event.stopPropagation()">
      <h2 class="reset-modal-title">Reset password</h2>
      <p class="reset-modal-subtitle">We'll send a reset link to</p>
      <div class="reset-modal-email">{{ user()?.email }}</div>
      <button class="reset-btn reset-btn--filled" (click)="onSendResetLink()" [disabled]="resetLinkSending()">
        {{ resetLinkSending() ? 'Sending...' : 'Send reset link' }}
      </button>
      <button class="reset-btn reset-btn--outline" (click)="onCancelReset()">Cancel</button>
    </div>
  </div>
</div>
