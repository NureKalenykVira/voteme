<section class="sia">
  <div class="sia__inner">
    <header class="sia__head">
      <h2 class="sia__title">
        <span class="sia__title-text">{{ 'home.sia.titleText' | translate }}</span>
        <span class="sia__title-pill">{{ 'home.sia.titlePill' | translate }}</span>
      </h2>
    </header>

    <div class="sia__grid">
      <div class="sia__video">
        <video
          #videoEl
          class="sia__video-el"
          [src]="videoUrl"
          [controls]="isPlaying()"
          muted
          playsinline
          preload="metadata"
          aria-label="Product walkthrough video"
          (click)="togglePlayback()"
          (play)="onVideoPlay()"
          (pause)="onVideoPause()"
          (ended)="onVideoEnded()"
        ></video>
        @if (!isPlaying()) {
          <button
            type="button"
            class="sia__play"
            aria-label="Play walkthrough video"
            (click)="togglePlayback()"
          >
            <span class="sia__play-icon" aria-hidden="true"></span>
          </button>
        }
      </div>

      <div class="sia__note">
        <p class="sia__note-text">
          {{ 'home.sia.note' | translate }}
        </p>
      </div>
    </div>

    <ui-faq-banner class="sia__faq" />
  </div>
</section>
