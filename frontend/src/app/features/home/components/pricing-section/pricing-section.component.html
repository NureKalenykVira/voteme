<section class="pricing">
  <div class="pricing__inner">
    <header class="pricing__head">
      <span class="pricing__pill">{{ 'home.pricing.label' | translate }}</span>
      <h2 class="pricing__subtitle">{{ 'home.pricing.subtitle' | translate }}</h2>
    </header>

    <div class="pricing__grid">
      <article class="pricing-card pricing-card--free">
        <span class="pricing-card__badge pricing-card__badge--free">{{ 'home.pricing.free.badge' | translate }}</span>
        <p class="pricing-card__desc">
          {{ 'home.pricing.free.desc' | translate }}
        </p>
      </article>

      <article class="pricing-card pricing-card--pro">
        <span class="pricing-card__badge pricing-card__badge--pro">{{ 'home.pricing.pro.badge' | translate }}</span>
        <p class="pricing-card__desc">
          {{ 'home.pricing.pro.desc' | translate }}
        </p>
      </article>
    </div>

    <div class="pricing__banner">
      <span class="pricing__banner-text">{{ 'home.pricing.banner' | translate }}</span>
    </div>
  </div>
</section>
