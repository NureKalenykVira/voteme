<div class="field">
  <label [for]="id" class="label">{{ label }}</label>
  <div class="input-wrap">
    <input
      [id]="id"
      [type]="showPassword() ? 'text' : 'password'"
      class="input"
      [class.invalid]="hasError"
      [autocomplete]="autocomplete"
      [value]="_value"
      (input)="onInput($event)"
      (blur)="onTouched()"
    />
    <button
      type="button"
      class="eye-btn"
      (click)="showPassword.update(v => !v)"
      aria-label="Toggle visibility"
    >
      <img
        [src]="showPassword() ? '/assets/auth/closed_eye.svg' : '/assets/auth/open_eye.svg'"
        alt=""
        class="eye-icon"
      />
    </button>
  </div>
  <span *ngIf="hasError && errorMessage" class="error-msg">{{ errorMessage }}</span>
</div>
