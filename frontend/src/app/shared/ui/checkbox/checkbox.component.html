<label class="checkbox-row" [for]="id">
  <span class="custom-checkbox" [class.checked]="_checked" (click)="toggle()">
    <svg *ngIf="_checked" class="checkmark" viewBox="0 0 14 11" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 5L5.5 9.5L13 1" stroke="#C8F135" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
  <span class="checkbox-label">{{ label }}</span>
</label>
