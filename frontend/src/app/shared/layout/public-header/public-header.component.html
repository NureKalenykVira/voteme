<header class="header">
  <div class="header__pill">
    <a routerLink="/home" class="header__brand">VoteME</a>

    <nav class="header__nav">
      <a routerLink="/about" class="header__nav-link">About</a>
      <a routerLink="/faq" class="header__nav-link">FAQ</a>
    </nav>

    <a *ngIf="!authStorage.isAuthenticated()" routerLink="/auth/register" class="header__cta-btn">
      Get started
      <img src="/assets/auth/arrow_right.svg" class="header__cta-arrow" alt="" />
    </a>
    <a
      *ngIf="authStorage.isAuthenticated()"
      routerLink="/profile"
      class="header__cta-btn header__cta-btn--profile"
    >
      My profile
      <svg
        class="header__cta-arrow"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8" />
        <path
          d="M4 20c0-4 3.6-7 8-7s8 3 8 7"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </svg>
    </a>
  </div>
</header>
